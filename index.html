<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | Pro V3</title>
    <style>
        :root { --main-color: #00ff00; --bg-dark: #0e0e0e; --panel-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        #header { background: var(--panel-bg); padding: 10px 20px; border-bottom: 2px solid var(--main-color); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav-btns button { background: none; border: 1px solid var(--main-color); color: var(--main-color); padding: 5px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; }

        /* Call Bar & Avatars */
        #callBar { display: none; background: #111; border-bottom: 1px solid var(--main-color); padding: 15px; display: flex; gap: 15px; align-items: center; overflow-x: auto; min-height: 80px; }
        .avatar { width: 50px; height: 50px; background: #004d4d; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid #333; transition: 0.3s; position: relative; }
        .avatar.speaking { border-color: var(--main-color); box-shadow: 0 0 15px var(--main-color); transform: scale(1.1); }
        .avatar::after { content: ''; position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: var(--main-color); border-radius: 50%; border: 2px solid #111; }

        /* Messages */
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: var(--panel-bg); padding: 12px; border-radius: 8px; max-width: 80%; align-self: flex-start; border-right: 4px solid var(--main-color); cursor: pointer; position: relative; }
        .actions { display: none; position: absolute; left: -80px; top: 50%; transform: translateY(-50%); background: #222; border: 1px solid var(--main-color); border-radius: 5px; padding: 5px; display: flex; gap: 5px; }
        .actions button { background: none; border: none; color: white; cursor: pointer; font-size: 16px; }

        /* Settings Modal (Centered) */
        #settingsModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 30px; border: 2px solid var(--main-color); z-index: 1000; border-radius: 15px; width: 320px; box-shadow: 0 0 50px #000; text-align: center; }
        #settingsModal input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .ver { font-size: 10px; color: #666; margin-top: 15px; display: block; }

        /* Input Area */
        #input-area { background: var(--panel-bg); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input#chatInput { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-weight: bold; font-size: 18px;">⚡ AsimTalk</div>
    <div class="nav-btns">
        <button onclick="joinVoice()" id="joinBtn">📞 دخول المكالمة</button>
        <button onclick="toggleSettings()">⚙️</button>
    </div>
</div>

<div id="callBar">
    <div id="participantsList" style="display: flex; gap: 15px;"></div>
    <button onclick="leaveVoice()" style="background:red; color:white; border:none; border-radius:5px; padding:5px 10px; margin-right:auto;">مغادرة</button>
</div>

<div id="messages"></div>

<div id="settingsModal">
    <h3 style="color:var(--main-color); margin-bottom:20px;">⚙️ الإعدادات</h3>
    <input type="text" id="setUserName" placeholder="اسمك المستعار">
    <button onclick="saveSettings()" style="width:100%; padding:12px; background:var(--main-color); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">حفظ التغييرات</button>
    <button onclick="toggleSettings()" style="width:100%; margin-top:10px; background:#333; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer;">إغلاق</button>
    <span class="ver">إصدار النظام: V3.0.4 (WebRTC Enabled)</span>
</div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()" style="background:var(--main-color); border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">إرسال</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "asimtalk-8a037.firebasestorage.app",
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let myName = localStorage.getItem('chatName') || "عاصم";
    document.getElementById('setUserName').value = myName;

    // --- نظام المكالمة والصوت (WebRTC) ---
    let audioCtx, analyser, dataArray, source;

    window.joinVoice = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('callBar').style.display = 'flex';
            document.getElementById('joinBtn').style.display = 'none';

            await setDoc(doc(db, "active_calls", myName), { 
                name: myName, 
                initials: myName.substring(0, 2),
                isSpeaking: false 
            });

            // كشف الصوت لجعل الدائرة تلمع
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            detectSpeaking();

        } catch(e) { alert("افتح المايك يا بطل!"); }
    };

    function detectSpeaking() {
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a, b) => a + b, 0);
        let average = sum / dataArray.length;
        let isSpeaking = average > 30; // حساسية الصوت
        
        updateDoc(doc(db, "active_calls", myName), { isSpeaking: isSpeaking });
        requestAnimationFrame(detectSpeaking);
    }

    window.leaveVoice = async () => {
        await deleteDoc(doc(db, "active_calls", myName));
        location.reload();
    };

    onSnapshot(collection(db, "active_calls"), (snap) => {
        const list = document.getElementById('participantsList');
        list.innerHTML = "";
        snap.forEach(d => {
            const u = d.data();
            const div = document.createElement('div');
            div.className = `avatar ${u.isSpeaking ? 'speaking' : ''}`;
            div.title = u.name;
            div.innerText = u.initials;
            list.appendChild(div);
        });
    });

    // --- الشات والتحكم ---
    window.toggleSettings = () => {
        const m = document.getElementById('settingsModal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    };

    window.saveSettings = () => {
        const n = document.getElementById('setUserName').value;
        localStorage.setItem('chatName', n);
        location.reload();
    };

    window.sendMsg = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), { text: input.value, user: myName, time: serverTimestamp() });
        input.value = "";
    };

    window.deleteMsg = async (id) => { if(confirm("حذف؟")) await deleteDoc(doc(db, "messages", id)); };
    window.editMsg = async (id, oldText) => {
        const newText = prompt("تعديل:", oldText);
        if(newText) await updateDoc(doc(db, "messages", id), { text: newText });
    };

    onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
        const container = document.getElementById('messages');
        container.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const isMe = data.user === myName;
            const div = document.createElement('div');
            div.className = 'msg';
            div.onclick = () => {
                const act = div.querySelector('.actions');
                if(act) act.style.display = (act.style.display === 'flex' ? 'none' : 'flex');
            };
            div.innerHTML = `
                <span style="color:var(--main-color); font-size:10px;">${data.user}</span>
                <div>${data.text}</div>
                ${isMe ? `<div class="actions">
                    <button onclick="event.stopPropagation(); editMsg('${d.id}', '${data.text}')">✏️</button>
                    <button onclick="event.stopPropagation(); deleteMsg('${d.id}')">🗑️</button>
                </div>` : ''}
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    });
</script>
</body>
</html>
