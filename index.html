<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | اسيم تالك</title>
    <style>
        body { background: #0b0b0b; color: #00ff00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #151515; padding: 30px; border-radius: 15px; border: 1px solid #00ff00; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #00ff00; border: none; color: black; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00cc00; transform: scale(1.05); }
        .status { font-size: 12px; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

<div class="login-card" id="auth-container">
    <h2>AsimTalk ⚡</h2>
    <input type="email" id="email" placeholder="الايميل">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <button onclick="register()" style="background:none; color:#00ff00; margin-top:10px;">إنشاء حساب جديد</button>
    <div id="msg" class="status">جاهز للنظام...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // حط الـ Config حقك هنا
  const firebaseConfig = {
    apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
    authDomain: "asimtalk-8a037.firebaseapp.com",
    projectId: "asimtalk-8a037",
    storageBucket: "",
    messagingSenderId: "76554634749",
    appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.register = async () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    try {
        await createUserWithEmailAndPassword(auth, email, pass);
        alert("تم إنشاء حسابك يا وحش!");
    } catch (err) { alert(err.message); }
  };

  window.login = async () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    try {
        await signInWithEmailAndPassword(auth, email, pass);
        document.getElementById('auth-container').innerHTML = "<h2>تم تسجيل الدخول! ✅</h2><p>انتظر برمجتنا للشات...</p>";
    } catch (err) { alert("خطأ في البيانات"); }
  };
</script>

</body>
</html>
