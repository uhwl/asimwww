<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | Private V3.1</title>
    <style>
        :root { --main-color: #00ff00; --bg-dark: #0e0e0e; --panel-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { background: var(--panel-bg); padding: 10px 20px; border-bottom: 2px solid var(--main-color); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav-btns button { background: none; border: 1px solid var(--main-color); color: var(--main-color); padding: 5px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #callBar { display: none; background: #111; border-bottom: 1px solid var(--main-color); padding: 15px; display: flex; gap: 15px; align-items: center; overflow-x: auto; min-height: 80px; }
        .avatar { width: 50px; height: 50px; background: #004d4d; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid #333; transition: 0.2s; position: relative; }
        .avatar.speaking { border-color: var(--main-color); box-shadow: 0 0 20px var(--main-color); transform: scale(1.05); }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: var(--panel-bg); padding: 12px; border-radius: 8px; max-width: 80%; align-self: flex-start; border-right: 4px solid var(--main-color); cursor: pointer; position: relative; }
        .actions { display: none; margin-top: 8px; border-top: 1px solid #333; padding-top: 5px; gap: 15px; }
        .actions span { font-size: 12px; cursor: pointer; color: #888; }
        .actions span:hover { color: var(--main-color); }
        #settingsModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 30px; border: 2px solid var(--main-color); z-index: 1000; border-radius: 15px; width: 300px; text-align: center; }
        #settingsModal input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        #input-area { background: var(--panel-bg); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input#chatInput { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-weight: bold; font-size: 18px;">⚡ AsimTalk</div>
    <div class="nav-btns">
        <button onclick="joinVoice()" id="joinBtn">📞 دخول</button>
        <button onclick="toggleSettings()">⚙️</button>
    </div>
</div>

<div id="callBar">
    <div id="participantsList" style="display: flex; gap: 15px;"></div>
    <button onclick="leaveVoice()" style="background:red; color:white; border:none; border-radius:5px; padding:5px 10px; margin-right:auto;">مغادرة</button>
</div>

<div id="messages"></div>

<div id="settingsModal">
    <h3 style="color:var(--main-color);">⚙️ الإعدادات</h3>
    <input type="text" id="setUserName" placeholder="الاسم">
    <input type="email" id="setUserEmail" placeholder="الايميل">
    <button onclick="saveSettings()" style="width:100%; padding:12px; background:var(--main-color); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">حفظ</button>
    <button onclick="toggleSettings()" style="width:100%; margin-top:10px; background:#333; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer;">إغلاق</button>
    <div style="font-size: 10px; color: #555; margin-top: 10px;">إصدار V3.1.0</div>
</div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب هنا..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()" style="background:var(--main-color); border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">إرسال</button>
</div>

<div id="audioContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "asimtalk-8a037.firebasestorage.app",
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let myName = localStorage.getItem('chatName') || "عاصم";
    let myEmail = localStorage.getItem('chatEmail') || "";
    document.getElementById('setUserName').value = myName;
    document.getElementById('setUserEmail').value = myEmail;

    // --- نظام الصوت المطور ---
    let localStream;
    window.joinVoice = async () => {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        document.getElementById('callBar').style.display = 'flex';
        document.getElementById('joinBtn').style.display = 'none';

        await setDoc(doc(db, "active_calls", myName), { 
            name: myName, initials: myName.substring(0, 2), isSpeaking: false 
        });

        // مراقبة مستوى الصوت (الدائرة الخضراء)
        const audioContext = new AudioContext();
        const analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaStreamSource(localStream);
        source.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);

        const checkVoice = () => {
            analyser.getByteFrequencyData(data);
            let volume = data.reduce((a, b) => a + b) / data.length;
            updateDoc(doc(db, "active_calls", myName), { isSpeaking: volume > 35 });
            requestAnimationFrame(checkVoice);
        };
        checkVoice();
    };

    window.leaveVoice = async () => {
        await deleteDoc(doc(db, "active_calls", myName));
        location.reload();
    };

    onSnapshot(collection(db, "active_calls"), (snap) => {
        const list = document.getElementById('participantsList');
        list.innerHTML = "";
        snap.forEach(d => {
            const u = d.data();
            list.innerHTML += `<div class="avatar ${u.isSpeaking ? 'speaking' : ''}" title="${u.name}">${u.initials}</div>`;
        });
    });

    // --- الشات والتحكم (تعديل/حذف فوري) ---
    window.toggleSettings = () => {
        const m = document.getElementById('settingsModal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    };

    window.saveSettings = () => {
        localStorage.setItem('chatName', document.getElementById('setUserName').value);
        localStorage.setItem('chatEmail', document.getElementById('setUserEmail').value);
        location.reload();
    };

    window.sendMsg = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), { text: input.value, user: myName, email: myEmail, time: serverTimestamp() });
        input.value = "";
    };

    window.fastDelete = async (id) => { await deleteDoc(doc(db, "messages", id)); };
    window.fastEdit = async (id, old) => {
        const n = prompt("تعديل:", old);
        if(n) await updateDoc(doc(db, "messages", id), { text: n });
    };

    onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
        const container = document.getElementById('messages');
        container.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const isMe = data.user === myName || (data.email === myEmail && myEmail !== "");
            const div = document.createElement('div');
            div.className = 'msg';
            div.onclick = () => {
                const act = div.querySelector('.actions');
                if(act) act.style.display = (act.style.display === 'flex' ? 'none' : 'flex');
            };
            div.innerHTML = `
                <span style="color:var(--main-color); font-size:10px;">${data.user}</span>
                <div>${data.text}</div>
                ${isMe ? `<div class="actions">
                    <span onclick="event.stopPropagation(); fastEdit('${d.id}', '${data.text}')">تعديل</span>
                    <span onclick="event.stopPropagation(); fastDelete('${d.id}')" style="color:#ff4444;">حذف</span>
                </div>` : ''}
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    });
</script>
</body>
</html>
