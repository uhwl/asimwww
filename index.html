<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | Pro 🚀</title>
    <style>
        :root { --main-color: #00ff00; --bg-dark: #0e0e0e; --panel-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { background: var(--panel-bg); padding: 10px 20px; border-bottom: 2px solid var(--main-color); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav-btns button { background: none; border: 1px solid var(--main-color); color: var(--main-color); padding: 5px 10px; cursor: pointer; border-radius: 5px; margin-left: 5px; font-size: 14px; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .msg { background: var(--panel-bg); padding: 10px; border-radius: 8px; position: relative; max-width: 80%; align-self: flex-start; border-right: 3px solid var(--main-color); cursor: pointer; }
        .user-name { color: var(--main-color); font-size: 11px; font-weight: bold; margin-bottom: 3px; display: block; }
        
        /* منطقة المكالمة داخل الموقع */
        #callContainer { display: none; position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px); background: #000; z-index: 50; }
        #callContainer iframe { width: 100%; height: 100%; border: none; }
        #closeCall { position: absolute; top: 10px; left: 10px; background: red; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 60; font-weight: bold; }

        #settingsModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 25px; border: 2px solid var(--main-color); z-index: 1000; border-radius: 12px; width: 85%; max-width: 350px; }
        #input-area { background: var(--panel-bg); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; z-index: 10; }
        input#chatInput { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 5px; outline: none; }
        #sendBtn { background: var(--main-color); border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-weight: bold; font-size: 20px;">⚡ AsimTalk</div>
    <div class="nav-btns">
        <button id="callBtn" onclick="toggleCall()">📞 مكالمة فيديو</button>
        <button onclick="toggleSettings()">⚙️</button>
    </div>
</div>

<div id="callContainer">
    <button id="closeCall" onclick="toggleCall()">X</button>
    <iframe id="callFrame" allow="camera; microphone; display-capture; autoplay"></iframe>
</div>

<div id="messages"></div>

<div id="settingsModal">
    <h3>⚙️ الإعدادات</h3>
    <input type="text" id="setUserName" placeholder="الاسم">
    <input type="email" id="setUserEmail" placeholder="الايميل">
    <button onclick="saveSettings()" style="width: 100%; padding: 12px; background: var(--main-color); border: none; border-radius: 5px;">حفظ</button>
</div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button id="sendBtn" onclick="sendMsg()">إرسال</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "asimtalk-8a037.firebasestorage.app",
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const notifSound = new Audio('notif.mp3');
    const pageLoadTime = Date.now();

    // تشغيل وإغلاق المكالمة داخل الموقع
    window.toggleCall = () => {
        const container = document.getElementById('callContainer');
        const frame = document.getElementById('callFrame');
        const btn = document.getElementById('callBtn');

        if (container.style.display === 'block') {
            container.style.display = 'none';
            frame.src = ""; // إغلاق المكالمة نهائياً
            btn.innerText = "📞 مكالمة فيديو";
        } else {
            container.style.display = 'block';
            // رابط الغرفة الخاصة بك
            frame.src = "https://meet.jit.si/AsimTalk-Live-Room#config.startWithAudioMuted=true"; 
            btn.innerText = "🔙 العودة للشات";
        }
    };

    // باقي كود الشات (نفسه بدون تغيير)
    let myName = localStorage.getItem('chatName') || "مستخدم_" + Math.floor(Math.random()*99);
    let myEmail = localStorage.getItem('chatEmail') || "";
    document.getElementById('setUserName').value = myName;
    document.getElementById('setUserEmail').value = myEmail;

    window.toggleSettings = () => {
        const m = document.getElementById('settingsModal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    };

    window.saveSettings = () => {
        myName = document.getElementById('setUserName').value;
        myEmail = document.getElementById('setUserEmail').value;
        localStorage.setItem('chatName', myName);
        localStorage.setItem('chatEmail', myEmail);
        toggleSettings();
    };

    window.sendMsg = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), {
            text: input.value,
            user: myName,
            email: myEmail,
            time: serverTimestamp()
        });
        input.value = "";
    };

    const q = query(collection(db, "messages"), orderBy("time", "asc"));
    onSnapshot(q, (snapshot) => {
        const container = document.getElementById('messages');
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const data = change.doc.data();
                const msgTime = data.time ? data.time.toMillis() : Date.now();
                if (data.user !== myName && msgTime > (pageLoadTime + 5000)) {
                    notifSound.play().catch(() => {});
                }
            }
        });
        container.innerHTML = "";
        snapshot.forEach(d => {
            const data = d.data();
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="user-name">${data.user}</span><div>${data.text}</div>`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    });

    if ("Notification" in window) Notification.requestPermission();
</script>
</body>
</html>
