<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | Pro</title>
    <style>
        :root { --main-color: #00ff00; --bg-dark: #0e0e0e; --panel-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        #header { background: var(--panel-bg); padding: 10px 20px; border-bottom: 2px solid var(--main-color); display: flex; justify-content: space-between; align-items: center; }
        .nav-btns button { background: none; border: 1px solid var(--main-color); color: var(--main-color); padding: 5px 10px; cursor: pointer; border-radius: 5px; margin-left: 5px; }
        
        /* Messages Area */
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: var(--panel-bg); padding: 10px; border-radius: 8px; position: relative; max-width: 80%; align-self: flex-start; border-right: 3px solid var(--main-color); }
        .user-name { color: var(--main-color); font-size: 11px; font-weight: bold; margin-bottom: 3px; display: block; }
        
        /* Actions */
        .actions { display: none; position: absolute; left: -70px; top: 5px; background: #222; border-radius: 4px; padding: 2px; }
        .actions button { background: none; border: none; color: white; cursor: pointer; padding: 2px 5px; font-size: 12px; }
        
        /* Settings Modal */
        #settingsModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border: 2px solid var(--main-color); z-index: 100; border-radius: 10px; width: 300px; }
        #settingsModal input { width: 90%; padding: 10px; margin: 10px 0; background: #333; color: white; border: 1px solid #444; }

        /* Input Area */
        #input-area { background: var(--panel-bg); padding: 15px; display: flex; gap: 10px; }
        input#chatInput { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-weight: bold;">⚡ AsimTalk</div>
    <div class="nav-btns">
        <button onclick="startCall()">📞 مكالمة</button>
        <button onclick="toggleSettings()">⚙️ الإعدادات</button>
    </div>
</div>

<div id="messages"></div>

<div id="settingsModal">
    <h3>إعدادات الحساب</h3>
    <label>الاسم المستعار:</label>
    <input type="text" id="setUserName">
    <label>الايميل (للمزامنة):</label>
    <input type="email" id="setUserEmail" placeholder="example@mail.com">
    <button onclick="saveSettings()" style="width: 100%; padding: 10px; background: var(--main-color); border: none; font-weight: bold; cursor: pointer;">حفظ التغييرات</button>
    <button onclick="toggleSettings()" style="width: 100%; margin-top: 5px; background: #444; color: white; border: none; padding: 5px; cursor: pointer;">إغلاق</button>
</div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب رسالتك واضغط Enter..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()" style="background: var(--main-color); border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">إرسال</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "",
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // تحميل البيانات
    let myName = localStorage.getItem('chatName') || "مستخدم_" + Math.floor(Math.random()*99);
    let myEmail = localStorage.getItem('chatEmail') || "";
    document.getElementById('setUserName').value = myName;
    document.getElementById('setUserEmail').value = myEmail;

    // دوال الإعدادات
    window.toggleSettings = () => {
        const modal = document.getElementById('settingsModal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    };

    window.saveSettings = () => {
        const newName = document.getElementById('setUserName').value;
        const newEmail = document.getElementById('setUserEmail').value;
        localStorage.setItem('chatName', newName);
        localStorage.setItem('chatEmail', newEmail);
        myName = newName;
        alert("تم الحفظ! سيتم تحديث هويتك في الرسائل القادمة.");
        toggleSettings();
    };

    window.startCall = () => {
        alert("جاري بدء المكالمة... (هذه الميزة تتطلب سيرفر WebRTC، سيتم توجيهك لغرفة مؤقتة)");
        window.open("https://meet.jit.si/AsimTalkRoom", "_blank");
    };

    // الإرسال
    window.sendMsg = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), {
            text: input.value,
            user: myName,
            email: myEmail,
            time: serverTimestamp()
        });
        input.value = "";
    };

    // الحذف والتعديل
    window.showActions = (id) => {
        const el = document.getElementById('actions-' + id);
        if(el) {
            el.style.display = 'block';
            setTimeout(() => { if(el) el.style.display = 'none'; }, 3000);
        }
    };

    window.deleteMsg = async (id) => {
        await deleteDoc(doc(db, "messages", id)); // حذف فوراً
    };

    window.editMsg = async (id, oldText) => {
        const newText = prompt("تعديل:", oldText);
        if(newText) await updateDoc(doc(db, "messages", id), { text: newText });
    };

    // استلام الرسائل
    const q = query(collection(db, "messages"), orderBy("time", "asc"));
    onSnapshot(q, (snapshot) => {
        const container = document.getElementById('messages');
        container.innerHTML = "";
        snapshot.forEach(d => {
            const data = d.data();
            const isMe = data.user === myName || (data.email && data.email === myEmail);
            const div = document.createElement('div');
            div.className = 'msg';
            if(isMe) div.onclick = () => showActions(d.id);
            
            div.innerHTML = `
                <span class="user-name">${data.user}</span>
                <div>${data.text}</div>
                ${isMe ? `<div id="actions-${d.id}" class="actions">
                    <button onclick="editMsg('${d.id}', '${data.text}')">✏️</button>
                    <button onclick="deleteMsg('${d.id}')">🗑️</button>
                </div>` : ''}
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    });
</script>

</body>
</html>
