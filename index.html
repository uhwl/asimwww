<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | V3.5.4vpro</title>
    <style>
        :root { --main-color: #00ff00; --bg-dark: #0e0e0e; --panel-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        body.theme-blue { --main-color: #0088ff; }
        body.theme-red { --main-color: #ff0044; }
        body.theme-gold { --main-color: #ffd700; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #222; }
        ::-webkit-scrollbar-thumb { background: #000; border: 1px solid #444; border-radius: 5px; }

        #header { background: var(--panel-bg); padding: 10px 20px; border-bottom: 2px solid var(--main-color); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav-btns button { background: none; border: 1px solid var(--main-color); color: var(--main-color); padding: 5px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; margin-right: 5px; }

        #callBar { display: none; background: #111; border-bottom: 1px solid var(--main-color); padding: 15px; gap: 20px; align-items: center; overflow-x: auto; min-height: 105px; }
        .avatar-container { position: relative; display: flex; flex-direction: column; align-items: center; min-width: 80px; }
        .avatar { width: 60px; height: 60px; background: #004d4d; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 5px solid #333; transition: 0.1s; }
        
        /* الدائرة الخضراء vpro */
        .avatar.speaking { border-color: #00ff00 !important; box-shadow: 0 0 25px #00ff00; transform: scale(1.08); }
        .name-label { font-size: 11px; color: #ccc; margin-top: 5px; white-space: nowrap; }

        .admin-controls { display: none; margin-top: 5px; gap: 5px; }
        .admin-controls button { font-size: 9px; padding: 3px 6px; cursor: pointer; border: none; border-radius: 3px; font-weight: bold; }

        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: var(--panel-bg); padding: 12px; border-radius: 8px; max-width: 80%; align-self: flex-start; border-right: 4px solid var(--main-color); cursor: pointer; }
        .actions { display: none; margin-top: 8px; border-top: 1px solid #333; padding-top: 5px; gap: 15px; font-size: 12px; }

        #settingsModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 30px; border: 2px solid var(--main-color); z-index: 1000; border-radius: 15px; width: 300px; text-align: center; }
        #settingsModal input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }

        #input-area { background: var(--panel-bg); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input#chatInput { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        
        #crashOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; justify-content: center; align-items: center; color: red; text-align: center; }
    </style>
</head>
<body>

<div id="crashOverlay">
    <h1 style="font-size: 40px;">CRITICAL ERROR</h1>
    <p>لقد تم تجميد حسابك من قبل المسؤول</p>
</div>

<div id="header">
    <div style="font-weight: bold; font-size: 18px;">⚡ AsimTalk <span style="color:var(--main-color)">vpro</span> <span id="adminTag" style="color: gold; font-size: 12px; display: none;">(Admin)</span></div>
    <div class="nav-btns"><button onclick="toggleSettings()">⚙️</button></div>
</div>

<div id="callBar">
    <div id="participantsList" style="display: flex; gap: 20px;"></div>
    <div id="callActions" style="margin-right: auto;">
        <button id="joinBtn" onclick="joinVoice()" style="background:var(--main-color); color:black; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">انضمام</button>
        <button id="leaveBtn" onclick="leaveVoice()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer; display:none;">مغادرة</button>
    </div>
</div>

<div id="messages"></div>

<div id="settingsModal">
    <h3 style="color:var(--main-color);">⚙️ الإعدادات vpro</h3>
    <input type="text" id="setUserName" placeholder="الاسم">
    <input type="email" id="setUserEmail" placeholder="الايميل">
    <button onclick="saveSettings()" style="width:100%; padding:12px; background:var(--main-color); border:none; border-radius:8px; font-weight:bold; color:black;">حفظ</button>
    
    <div id="adminOptions" style="display: none; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
        <button onclick="changeTheme()" style="background:#333; color:gold; border:1px solid gold; padding:5px; width:100%; cursor:pointer;">تغيير الثيم</button>
    </div>
    
    <div style="font-size: 10px; color: #444; margin-top: 15px;">Version 3.5.4vpro</div>
</div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب هنا..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()" style="background:var(--main-color); border:none; padding:10px 20px; border-radius:8px; font-weight:bold; color:black; cursor:pointer;">إرسال</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "asimtalk-8a037.firebasestorage.app",
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let myName = localStorage.getItem('chatName');
    let myEmail = localStorage.getItem('chatEmail');
    const isMaster = (myName === "عاصم" && myEmail === "nza76667@gmail.com");

    if (!myName) {
        onSnapshot(collection(db, "active_calls"), (s) => {
            if (!localStorage.getItem('chatName')) {
                let name = "مستخدم " + (s.size + 1);
                localStorage.setItem('chatName', name);
                location.reload();
            }
        });
    }

    if(isMaster) {
        document.getElementById('adminTag').style.display = 'inline';
        document.getElementById('adminOptions').style.display = 'block';
    }

    // كاشف الكراش للمستخدم العادي
    onSnapshot(doc(db, "active_calls", myName || "guest"), (s) => {
        if(s.exists() && s.data().isCrashed) document.getElementById('crashOverlay').style.display = 'flex';
        else document.getElementById('crashOverlay').style.display = 'none';
    });

    let isInCall = false;
    let localStream;

    window.joinVoice = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            isInCall = true;
            await setDoc(doc(db, "active_calls", myName), { 
                name: myName, initials: myName.substring(0, 2), isSpeaking: false, isCrashed: false 
            });

            const audioCtx = new AudioContext();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(localStream);
            source.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);

            const loop = () => {
                if(!isInCall) return;
                analyser.getByteFrequencyData(data);
                let v = data.reduce((a, b) => a + b) / data.length;
                updateDoc(doc(db, "active_calls", myName), { isSpeaking: v > 0.5 });
                requestAnimationFrame(loop);
            };
            loop();
        } catch (e) { alert("فعل المايك!"); }
    };

    window.leaveVoice = async () => {
        isInCall = false;
        await deleteDoc(doc(db, "active_calls", myName));
        location.reload();
    };

    onSnapshot(collection(db, "active_calls"), (snap) => {
        const bar = document.getElementById('callBar');
        const list = document.getElementById('participantsList');
        if (snap.empty) { bar.style.display = 'none'; } 
        else {
            bar.style.display = 'flex';
            list.innerHTML = "";
            let present = false;
            snap.forEach(d => {
                const u = d.data();
                if(u.name === myName) present = true;
                list.innerHTML += `
                    <div class="avatar-container">
                        <div class="avatar ${u.isSpeaking ? 'speaking' : ''}">${u.initials}</div>
                        <span class="name-label">${u.name}</span>
                        ${isMaster && u.name !== myName ? `
                            <div class="admin-controls" style="display:flex;">
                                <button onclick="window.kick('${u.name}')" style="background:red; color:white;">طرد</button>
                                <button onclick="window.crash('${u.name}', ${u.isCrashed})" style="background:orange;">${u.isCrashed ? 'فك' : 'كرش'}</button>
                            </div>
                        ` : ''}
                    </div>`;
            });
            document.getElementById('joinBtn').style.display = present ? 'none' : 'block';
            document.getElementById('leaveBtn').style.display = present ? 'block' : 'none';
        }
    });

    window.kick = async (t) => await deleteDoc(doc(db, "active_calls", t));
    window.crash = async (t, s) => await updateDoc(doc(db, "active_calls", t), { isCrashed: !s });
    window.changeTheme = () => {
        const ts = ['', 'theme-blue', 'theme-red', 'theme-gold'];
        document.body.className = ts[(ts.indexOf(document.body.className) + 1) % ts.length];
    };

    window.sendMsg = async () => {
        const i = document.getElementById('chatInput');
        if(!i.value.trim()) return;
        const text = i.value; i.value = "";
        await addDoc(collection(db, "messages"), { text, user: myName, email: myEmail, time: serverTimestamp() });
    };

    onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
        const c = document.getElementById('messages');
        c.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const mine = data.user === myName;
            const div = document.createElement('div');
            div.className = 'msg';
            div.onclick = () => { if(mine) {
                const a = div.querySelector('.actions');
                a.style.display = (a.style.display === 'flex' ? 'none' : 'flex');
            }};
            div.innerHTML = `<span style="color:var(--main-color); font-size:10px;">${data.user}</span><div>${data.text}</div>
                ${mine ? `<div class="actions"><span onclick="event.stopPropagation(); window.fEdit('${d.id}', '${data.text}')">✏️</span><span onclick="event.stopPropagation(); window.fDel('${d.id}')" style="color:red;">🗑️</span></div>` : ''}`;
            c.appendChild(div);
        });
        c.scrollTop = c.scrollHeight;
    });

    window.fDel = async (id) => await deleteDoc(doc(db, "messages", id));
    window.fEdit = async (id, o) => {
        const n = prompt("تعديل:", o);
        if(n) await updateDoc(doc(db, "messages", id), { text: n });
    };
    window.toggleSettings = () => {
        const m = document.getElementById('settingsModal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    };
    window.saveSettings = () => {
        localStorage.setItem('chatName', document.getElementById('setUserName').value);
        localStorage.setItem('chatEmail', document.getElementById('setUserEmail').value);
        location.reload();
    };
    document.getElementById('setUserName').value = myName || "";
    document.getElementById('setUserEmail').value = myEmail || "";
</script>
</body>
</html>
