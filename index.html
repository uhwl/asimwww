<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | V3.5.7vpro</title>
    <style>
        :root { --main: #00ff00; --bg: #0a0a0a; --gray: #1a1a1a; --light-gray: #2a2a2a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: 0.5s; }
        
        /* الثيمات */
        body.theme-blue { --main: #0088ff; }
        body.theme-red { --main: #ff0044; }
        body.theme-gold { --main: #ffd700; }

        #header { background: var(--gray); padding: 12px 20px; border-bottom: 2px solid var(--light-gray); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav-btns { display: flex; gap: 8px; }
        .nav-btns button { background: var(--light-gray); border: 1px solid #333; color: #eee; padding: 8px 15px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .nav-btns button:hover { border-color: var(--main); }
        #dynamicBtn.leave-mode { background: #aa0000; color: white; border-color: #ff4444; }

        #callBar { display: none; background: #000; border-bottom: 1px solid var(--light-gray); padding: 15px; gap: 20px; align-items: center; min-height: 90px; overflow-x: auto; }
        .avatar-container { display: flex; flex-direction: column; align-items: center; min-width: 70px; }
        .avatar { width: 55px; height: 55px; background: #111; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 3px solid #333; transition: 0.1s; font-weight: bold; }
        .avatar.speaking { border-color: var(--main) !important; box-shadow: 0 0 15px var(--main); transform: scale(1.05); }

        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: linear-gradient(to bottom, #0a0a0a, #111); }
        .msg { background: var(--gray); padding: 12px; border-radius: 10px; max-width: 80%; align-self: flex-start; border-right: 4px solid var(--main); cursor: pointer; }
        .actions { display: none; margin-top: 8px; border-top: 1px solid #333; padding-top: 5px; gap: 15px; font-size: 14px; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border: 2px solid var(--main); z-index: 1000; border-radius: 15px; width: 300px; box-shadow: 0 0 50px #000; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        
        /* كود الثلج */
        .snowflake { position: fixed; top: -10px; color: white; font-size: 1em; pointer-events: none; z-index: 9999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh); } }

        #input-area { padding: 15px; display: flex; gap: 10px; background: var(--gray); border-top: 1px solid #333; }
        #chatInput { flex-grow: 1; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-weight:bold; font-size:18px;">AsimTalk <span style="color:var(--main)">vpro</span></div>
    <div class="nav-btns">
        <button onclick="toggleSnow()">❄️</button>
        <button id="dynamicBtn" onclick="handleCallAction()">إنشاء مكالمة</button>
        <button onclick="openModal('settingsModal')">⚙️</button>
    </div>
</div>

<div id="callBar">
    <div id="participantsList" style="display: flex; gap: 20px;"></div>
</div>

<div id="messages"></div>

<div id="settingsModal" class="modal">
    <h3>⚙️ إعدادات vpro</h3>
    <input type="text" id="uName" placeholder="الاسم">
    <input type="email" id="uEmail" placeholder="الايميل">
    <button onclick="saveSets()" style="width:100%; padding:10px; background:var(--main); border:none; border-radius:5px; font-weight:bold; color:black; cursor:pointer;">حفظ</button>
    
    <div id="adminZone" style="display:none; margin-top:15px; border-top:1px solid #333; padding-top:10px;">
        <select onchange="changeGlobalTheme(this.value)">
            <option value="">ثيم: أخضر</option>
            <option value="theme-blue">ثيم: أزرق</option>
            <option value="theme-red">ثيم: أحمر</option>
            <option value="theme-gold">ثيم: ذهبي</option>
        </select>
    </div>
    <p style="font-size:10px; color:#555; text-align:center; margin-top:15px;">Version 3.5.7vpro</p>
</div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') send()">
    <button onclick="send()" style="background:var(--main); border:none; padding:0 20px; border-radius:8px; font-weight:bold; color:black; cursor:pointer;">إرسال</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "asimtalk-8a037.firebasestorage.app",
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let myName = localStorage.getItem('chatName') || "مستخدم " + Math.floor(Math.random()*99);
    let myEmail = localStorage.getItem('chatEmail') || "";
    const isAdmin = (myName === "عاصم" && myEmail === "nza76667@gmail.com");

    let isIn = false;
    let callActive = false;

    // --- مزامنة الثيم ---
    onSnapshot(doc(db, "settings", "global"), (s) => {
        if(s.exists()) document.body.className = s.data().theme || "";
    });

    if(isAdmin) document.getElementById('adminZone').style.display = 'block';

    // --- نظام المكالمة المطور ---
    onSnapshot(collection(db, "active_calls"), (snap) => {
        const list = document.getElementById('participantsList');
        const bar = document.getElementById('callBar');
        const btn = document.getElementById('dynamicBtn');
        
        callActive = !snap.empty;
        bar.style.display = callActive ? 'flex' : 'none';
        
        list.innerHTML = "";
        let foundMe = false;
        snap.forEach(d => {
            const u = d.data();
            if(u.name === myName) foundMe = true;
            list.innerHTML += `
                <div class="avatar-container">
                    <div class="avatar ${u.isSpeaking?'speaking':''}" style="color:white;">${u.name.substring(0,2)}</div>
                    <span style="font-size:10px; margin-top:4px;">${u.name}</span>
                </div>`;
        });

        // تحديث الزر الذكي
        if(foundMe) {
            btn.innerText = "مغادرة";
            btn.className = "leave-mode";
            isIn = true;
        } else {
            btn.className = "";
            btn.innerText = callActive ? "انضمام" : "إنشاء مكالمة";
            isIn = false;
        }
    });

    window.handleCallAction = async () => {
        if(isIn) {
            await deleteDoc(doc(db, "active_calls", myName));
            location.reload();
        } else {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            await setDoc(doc(db, "active_calls", myName), { name: myName, isSpeaking: false });
            
            const ctx = new AudioContext();
            const analyzer = ctx.createAnalyser();
            ctx.createMediaStreamSource(stream).connect(analyzer);
            const data = new Uint8Array(analyzer.frequencyBinCount);
            const check = () => {
                analyzer.getByteFrequencyData(data);
                let vol = data.reduce((a,b)=>a+b)/data.length;
                updateDoc(doc(db, "active_calls", myName), { isSpeaking: vol > 0.5 });
                if(document.getElementById('dynamicBtn').innerText === "مغادرة") requestAnimationFrame(check);
            };
            check();
        }
    };

    // --- نظام الثلج ---
    let snowInterval;
    window.toggleSnow = () => {
        if(snowInterval) {
            clearInterval(snowInterval);
            snowInterval = null;
        } else {
            snowInterval = setInterval(() => {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.innerText = '❄';
                flake.style.left = Math.random() * 100 + 'vw';
                flake.style.animationDuration = Math.random() * 3 + 2 + 's';
                flake.style.opacity = Math.random();
                document.body.appendChild(flake);
                setTimeout(() => flake.remove(), 5000);
            }, 100);
        }
    };

    // --- الشات والحذف ---
    window.send = async () => {
        const i = document.getElementById('chatInput');
        if(!i.value.trim()) return;
        await addDoc(collection(db, "messages"), { text: i.value, user: myName, time: serverTimestamp() });
        i.value = "";
    };

    onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
        const c = document.getElementById('messages');
        c.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const isMe = data.user === myName;
            const div = document.createElement('div');
            div.className = 'msg';
            div.onclick = () => { if(isMe) {
                const a = div.querySelector('.actions');
                a.style.display = a.style.display==='flex'?'none':'flex';
            }};
            div.innerHTML = `<b style="color:var(--main); font-size:10px;">${data.user}</b><div>${data.text}</div>
                ${isMe?`<div class="actions"><span onclick="window.dl('${d.id}')" style="color:red;">🗑️ حذف</span></div>`:''}`;
            c.appendChild(div);
        });
        c.scrollTop = c.scrollHeight;
    });

    window.dl = async (id) => await deleteDoc(doc(db, "messages", id));
    window.changeGlobalTheme = async (t) => await updateDoc(doc(db, "settings", "global"), { theme: t });
    window.openModal = (id) => document.getElementById(id).style.display = 'block';
    window.saveSets = () => {
        localStorage.setItem('chatName', document.getElementById('uName').value);
        localStorage.setItem('chatEmail', document.getElementById('uEmail').value);
        location.reload();
    };
    document.getElementById('uName').value = myName;
    document.getElementById('uEmail').value = myEmail;
</script>
</body>
</html>
