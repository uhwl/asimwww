<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | V3.5.9vpro</title>
    <style>
        :root { --main: #00ff00; --bg: #0a0a0a; --gray: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* شاشة كلمة السر */
        #passLock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 20000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #passLock input { padding: 15px; border: 1px solid var(--main); background: #111; color: var(--main); text-align: center; border-radius: 10px; outline: none; }

        #header { background: var(--gray); padding: 12px 20px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        #callBar { display: none; background: #000; border-bottom: 1px solid #333; padding: 15px; gap: 20px; align-items: center; }
        .avatar { width: 50px; height: 50px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 3px solid #444; }
        .avatar.speaking { border-color: var(--main) !important; box-shadow: 0 0 15px var(--main); }

        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: var(--gray); padding: 10px; border-radius: 8px; border-right: 4px solid var(--main); position: relative; }

        /* قائمة الأوامر المساعدة */
        #cmdHint { display: none; background: #222; border: 1px solid var(--main); padding: 10px; position: absolute; bottom: 80px; right: 20px; border-radius: 8px; width: 200px; z-index: 5000; }
        #cmdHint div { padding: 5px; cursor: pointer; border-bottom: 1px solid #333; font-size: 13px; }
        #cmdHint div:hover { background: var(--main); color: black; }

        #input-area { padding: 15px; display: flex; gap: 10px; background: var(--gray); position: relative; }
        input#chatInput { flex-grow: 1; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        
        #crashOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 19000; justify-content: center; align-items: center; color: red; }
    </style>
</head>
<body>

<div id="passLock">
    <h2 style="color:var(--main)">🔒 نظام محمي</h2>
    <input type="password" id="entryPass" placeholder="أدخل كلمة السر للدخول" onkeyup="checkEntryPass(this.value)">
</div>

<div id="crashOverlay"><h1>SYSTEM HALTED</h1></div>

<div id="header">
    <div style="font-weight:bold;">AsimTalk <span style="color:var(--main)">vpro</span></div>
    <div style="display:flex; gap:10px;">
        <button id="dynamicBtn" onclick="handleCall()" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">تحميل...</button>
        <button onclick="toggleSet()" style="background:none; border:none; color:white; cursor:pointer;">⚙️</button>
    </div>
</div>

<div id="callBar"><div id="participantsList" style="display:flex; gap:15px;"></div></div>

<div id="messages"></div>

<div id="cmdHint">
    <div onclick="applyCmd('/kick ')">/kick (طرد)</div>
    <div onclick="applyCmd('/kick all')">/kick all (طرد الكل)</div>
    <div onclick="applyCmd('/crash ')">/crash (كراش)</div>
    <div onclick="applyCmd('/ban ')">/ban (حظر وقتي)</div>
    <div onclick="applyCmd('/ipall')">/ipall (كشف الـ IP)</div>
</div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب رسالة أو أمر /..." oninput="showCmds(this.value)" onkeydown="handleKey(event)">
    <button onclick="send()" style="background:var(--main); border:none; padding:0 20px; border-radius:8px; font-weight:bold; color:black;">إرسال</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "asimtalk-8a037.firebasestorage.app",
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let myName = localStorage.getItem('chatName') || "مستخدم " + Math.floor(Math.random()*99);
    let myEmail = localStorage.getItem('chatEmail') || "";
    const isAdmin = (myName === "عاصم" && myEmail === "nza76667@gmail.com");

    // --- كلمة السر ---
    window.checkEntryPass = (val) => {
        if(val === "aszayz") document.getElementById('passLock').style.display = 'none';
    };

    // --- نظام الأوامر ---
    window.showCmds = (val) => {
        const hint = document.getElementById('cmdHint');
        hint.style.display = (val.startsWith('/') && isAdmin) ? 'block' : 'none';
    };

    window.applyCmd = (cmd) => {
        document.getElementById('chatInput').value = cmd;
        document.getElementById('cmdHint').style.display = 'none';
        document.getElementById('chatInput').focus();
    };

    window.handleKey = (e) => {
        if(e.key === 'Enter') send();
    };

    // --- الوظائف الأساسية ---
    window.send = async () => {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if(!text) return;
        
        input.value = ""; // مسح الرسالة فوراً
        document.getElementById('cmdHint').style.display = 'none';

        if(text.startsWith('/') && isAdmin) {
            await processCommand(text);
        } else {
            await addDoc(collection(db, "messages"), { text, user: myName, time: serverTimestamp() });
        }
    };

    async function processCommand(cmd) {
        const parts = cmd.split(' ');
        const action = parts[0];
        const target = parts[1];

        if(action === '/kick') {
            if(target === 'all') {
                const snap = await getDocs(collection(db, "active_calls"));
                snap.forEach(async d => await deleteDoc(doc(db, "active_calls", d.id)));
            } else await deleteDoc(doc(db, "active_calls", target));
        }
        if(action === '/crash') await updateDoc(doc(db, "active_calls", target), { isCrashed: true });
        if(action === '/ipall') {
            alert("كشف البيانات (تجريبي):\nعاصم: 192.168.1.1\nمستخدم 2: 176.22.4.9");
        }
        if(action === '/ban') {
            const time = prompt("كم المدة؟ (دقيقة/ساعة/يوم)", "10 دقائق");
            alert(`تم حظر ${target} لمدة ${time}`);
        }
    }

    // --- مزامنة المكالمة ---
    onSnapshot(collection(db, "active_calls"), (snap) => {
        const list = document.getElementById('participantsList');
        const bar = document.getElementById('callBar');
        const btn = document.getElementById('dynamicBtn');
        bar.style.display = snap.empty ? 'none' : 'flex';
        list.innerHTML = "";
        let inCall = false;
        snap.forEach(d => {
            const u = d.data();
            if(u.name === myName) {
                inCall = true;
                if(u.isCrashed) document.getElementById('crashOverlay').style.display = 'flex';
            }
            list.innerHTML += `<div class="avatar ${u.isSpeaking?'speaking':''}">${u.name.substring(0,2)}</div>`;
        });
        btn.innerText = inCall ? "مغادرة" : (snap.empty ? "إنشاء مكالمة" : "انضمام");
    });

    window.handleCall = async () => {
        const btn = document.getElementById('dynamicBtn');
        if(btn.innerText === "مغادرة") {
            await deleteDoc(doc(db, "active_calls", myName));
        } else {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            await setDoc(doc(db, "active_calls", myName), { name: myName, isSpeaking: false, isCrashed: false });
            // كود الحساسية
            const actx = new AudioContext();
            const ana = actx.createAnalyser();
            actx.createMediaStreamSource(s).connect(ana);
            const data = new Uint8Array(ana.frequencyBinCount);
            const loop = () => {
                ana.getByteFrequencyData(data);
                let v = data.reduce((a,b)=>a+b)/data.length;
                updateDoc(doc(db, "active_calls", myName), { isSpeaking: v > 0.5 });
                requestAnimationFrame(loop);
            };
            loop();
        }
    };

    onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
        const c = document.getElementById('messages');
        c.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            c.innerHTML += `<div class="msg"><b style="color:var(--main); font-size:10px;">${data.user}</b><div>${data.text}</div></div>`;
        });
        c.scrollTop = c.scrollHeight;
    });

    window.toggleSet = () => {
        const n = prompt("تغيير الاسم:", myName);
        const e = prompt("تغيير الايميل:", myEmail);
        if(n) localStorage.setItem('chatName', n);
        if(e) localStorage.setItem('chatEmail', e);
        location.reload();
    };

    // تنظيف عند الخروج
    window.onbeforeunload = () => { if(myName) deleteDoc(doc(db, "active_calls", myName)); };
</script>
</body>
</html>
