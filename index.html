<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | مجلس الرهيبين</title>
    <style>
        body { background: #0e0e0e; color: #00ff00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #00ff00; font-weight: bold; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1a1a1a; padding: 10px 15px; border-radius: 10px; border-right: 4px solid #00ff00; max-width: 80%; align-self: flex-start; }
        #input-area { background: #1a1a1a; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: #fff; border-radius: 5px; outline: none; }
        input:focus { border-color: #00ff00; }
        button { padding: 10px 25px; background: #00ff00; border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; }
        button:hover { background: #00cc00; }
    </style>
</head>
<body>

<div id="chat-header">⚡ AsimTalk - شات عاصم ⚡</div>

<div id="messages" id="messageList">
    </div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب رسالتك يا وحش...">
    <button onclick="sendMsg()">إرسال 🚀</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // المعلومات الخاصة بمشروعك
    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "", // خليناه فاضي عشان نتجنب المشكلة السابقة
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة إرسال الرسالة
    window.sendMsg = async () => {
        const input = document.getElementById('chatInput');
        const text = input.value;
        if(text.trim() == "") return;

        try {
            await addDoc(collection(db, "messages"), {
                text: text,
                time: serverTimestamp(),
                user: "عاصم" // تقدر تغيرها لاحقاً لتجيب اسم المستخدم الحقيقي
            });
            input.value = "";
        } catch (e) {
            alert("خطأ في الإرسال، تأكد من إعدادات الـ Rules في Firestore");
        }
    };

    // استلام الرسايل مباشرة (Real-time)
    const q = query(collection(db, "messages"), orderBy("time", "asc"));
    onSnapshot(q, (snapshot) => {
        const msgContainer = document.getElementById('messages');
        msgContainer.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
            msgContainer.appendChild(div);
        });
        msgContainer.scrollTop = msgContainer.scrollHeight;
    });
</script>

</body>
</html>
