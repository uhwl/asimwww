<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | V3.5 PRO</title>
    <style>
        :root { --main-color: #00ff00; --bg-dark: #0e0e0e; --panel-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #222; }
        ::-webkit-scrollbar-thumb { background: #000; border: 1px solid #444; border-radius: 5px; }
        #header { background: var(--panel-bg); padding: 10px 20px; border-bottom: 2px solid var(--main-color); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav-btns button { background: none; border: 1px solid var(--main-color); color: var(--main-color); padding: 5px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #callBar { display: none; background: #111; border-bottom: 1px solid var(--main-color); padding: 15px; gap: 15px; align-items: center; overflow-x: auto; min-height: 85px; }
        .avatar { width: 60px; height: 60px; background: #004d4d; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 5px solid #333; transition: 0.15s; position: relative; flex-shrink: 0; }
        .avatar.speaking { border-color: var(--main-color); box-shadow: 0 0 25px var(--main-color); transform: scale(1.08); }
        .avatar::after { content: attr(data-name); position: absolute; bottom: -20px; font-size: 10px; color: #888; white-space: nowrap; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: var(--panel-bg); padding: 12px; border-radius: 8px; max-width: 80%; align-self: flex-start; border-right: 4px solid var(--main-color); cursor: pointer; position: relative; }
        .actions { display: none; margin-top: 8px; border-top: 1px solid #333; padding-top: 5px; gap: 15px; font-size: 12px; }
        #settingsModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 30px; border: 2px solid var(--main-color); z-index: 1000; border-radius: 15px; width: 300px; text-align: center; }
        #settingsModal input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        #input-area { background: var(--panel-bg); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input#chatInput { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-weight: bold; font-size: 18px;">⚡ AsimTalk PRO</div>
    <div class="nav-btns"><button onclick="toggleSettings()">⚙️ الإعدادات</button></div>
</div>

<div id="callBar">
    <div id="participantsList" style="display: flex; gap: 20px;"></div>
    <div id="callActions" style="margin-right: auto;">
        <button id="joinBtn" onclick="joinVoice()" style="background:var(--main-color); color:black; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">انضمام للمكالمة</button>
        <button id="leaveBtn" onclick="leaveVoice()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer; display:none;">مغادرة</button>
    </div>
</div>

<div id="messages"></div>

<div id="settingsModal">
    <h3 style="color:var(--main-color);">⚙️ الملف الشخصي</h3>
    <input type="text" id="setUserName" placeholder="الاسم">
    <input type="email" id="setUserEmail" placeholder="الايميل">
    <button onclick="saveSettings()" style="width:100%; padding:12px; background:var(--main-color); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">حفظ</button>
    <button onclick="toggleSettings()" style="width:100%; margin-top:10px; background:#333; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer;">إغلاق</button>
    <div style="font-size: 10px; color: #555; margin-top: 15px;">Version 3.5 PRO</div>
</div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب هنا..." onkeydown="if(event.key==='Enter') window.sendMsg()">
    <button onclick="window.sendMsg()" style="background:var(--main-color); border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer; color:black;">إرسال</button>
</div>

<div id="audio-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "asimtalk-8a037.firebasestorage.app",
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let myName = localStorage.getItem('chatName') || "عاصم";
    let myEmail = localStorage.getItem('chatEmail') || "";
    document.getElementById('setUserName').value = myName;
    document.getElementById('setUserEmail').value = myEmail;

    let localStream;
    let isInCall = false;

    // --- نظام الصوت PRO ---
    window.joinVoice = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            isInCall = true;
            
            // إضافة المستخدم لقاعدة البيانات
            await setDoc(doc(db, "active_calls", myName), { 
                name: myName, initials: myName.substring(0, 2), isSpeaking: false 
            });

            // كشف الصوت للدائرة الخضراء
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(localStream);
            source.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);

            const check = () => {
                if(!isInCall) return;
                analyser.getByteFrequencyData(data);
                let vol = data.reduce((a, b) => a + b) / data.length;
                updateDoc(doc(db, "active_calls", myName), { isSpeaking: vol > 5 });
                requestAnimationFrame(check);
            };
            check();
        } catch (e) { alert("يجب السماح بالمايك لتسمع ويسمعوك!"); }
    };

    window.leaveVoice = async () => {
        isInCall = false;
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        await deleteDoc(doc(db, "active_calls", myName));
        location.reload();
    };

    onSnapshot(collection(db, "active_calls"), (snap) => {
        const bar = document.getElementById('callBar');
        const list = document.getElementById('participantsList');
        if (snap.empty) { bar.style.display = 'none'; } 
        else {
            bar.style.display = 'flex';
            list.innerHTML = "";
            let foundMe = false;
            snap.forEach(d => {
                const u = d.data();
                list.innerHTML += `<div class="avatar ${u.isSpeaking ? 'speaking' : ''}" data-name="${u.name}">${u.initials}</div>`;
                if(u.name === myName) foundMe = true;
            });
            document.getElementById('joinBtn').style.display = foundMe ? 'none' : 'block';
            document.getElementById('leaveBtn').style.display = foundMe ? 'block' : 'none';
        }
    });

    // --- نظام الشات ---
    window.sendMsg = async () => {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if(!text) return;
        await addDoc(collection(db, "messages"), { text, user: myName, email: myEmail, time: serverTimestamp() });
        input.value = "";
    };

    onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
        const container = document.getElementById('messages');
        container.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const isMe = data.user === myName || (data.email === myEmail && myEmail !== "");
            const div = document.createElement('div');
            div.className = 'msg';
            div.onclick = () => {
                const act = div.querySelector('.actions');
                if(act) act.style.display = (act.style.display === 'flex' ? 'none' : 'flex');
            };
            div.innerHTML = `<span style="color:var(--main-color); font-size:10px;">${data.user}</span><div>${data.text}</div>
                ${isMe ? `<div class="actions"><span onclick="event.stopPropagation(); window.fastEdit('${d.id}', '${data.text}')">✏️</span><span onclick="event.stopPropagation(); window.fastDelete('${d.id}')" style="color:red;">🗑️</span></div>` : ''}`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    });

    window.fastDelete = async (id) => { await deleteDoc(doc(db, "messages", id)); };
    window.fastEdit = async (id, old) => {
        const n = prompt("تعديل:", old);
        if(n) await updateDoc(doc(db, "messages", id), { text: n });
    };
    window.toggleSettings = () => {
        const m = document.getElementById('settingsModal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    };
    window.saveSettings = () => {
        localStorage.setItem('chatName', document.getElementById('setUserName').value);
        localStorage.setItem('chatEmail', document.getElementById('setUserEmail').value);
        location.reload();
    };
</script>
</body>
</html>
