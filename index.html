<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | Private 🚀</title>
    <style>
        :root { --main-color: #00ff00; --bg-dark: #0e0e0e; --panel-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { background: var(--panel-bg); padding: 10px 20px; border-bottom: 2px solid var(--main-color); display: flex; justify-content: space-between; align-items: center; }
        
        /* مستطيل المكالمة الصغير */
        #callBar { display: none; background: #111; border-bottom: 1px solid var(--main-color); padding: 10px; display: flex; gap: 10px; align-items: center; overflow-x: auto; min-height: 60px; }
        .avatar { width: 45px; height: 45px; background: #008080; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; border: 2px solid var(--main-color); font-size: 14px; flex-shrink: 0; }
        
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: var(--panel-bg); padding: 10px; border-radius: 8px; max-width: 80%; align-self: flex-start; border-right: 3px solid var(--main-color); }
        #input-area { background: var(--panel-bg); padding: 15px; display: flex; gap: 10px; }
        input#chatInput { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 5px; outline: none; }
        button { background: var(--main-color); border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-weight: bold;">⚡ AsimTalk</div>
    <button onclick="startVoiceCall()" id="callBtn">📞 دخول المكالمة</button>
</div>

<div id="callBar" style="display:none;">
    <div id="participantsList" style="display: flex; gap: 10px;"></div>
    <button onclick="endCall()" style="background:red; font-size:12px; margin-right:auto;">مغادرة</button>
</div>

<div id="messages"></div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب هنا...">
    <button onclick="sendMsg()">إرسال</button>
</div>

<audio id="remoteAudio" autoplay></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "asimtalk-8a037.firebasestorage.app",
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let myName = localStorage.getItem('chatName') || "عاصم";
    let localStream;
    let peerConnection;

    // دالة أول حرفين
    const getInitials = (n) => n.substring(0, 2);

    window.startVoiceCall = async () => {
        document.getElementById('callBar').style.display = 'flex';
        document.getElementById('callBtn').style.display = 'none';
        
        // تسجيل اسمك في الـ "المتواجدين حالياً بالمكالمة" في Firebase
        await setDoc(doc(db, "active_calls", myName), {
            name: myName,
            initials: getInitials(myName),
            joinedAt: serverTimestamp()
        });

        // طلب إذن المايك (WebRTC مباشر)
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // هنا نقوم بإعداد الاتصال المباشر (بيتم ربطه بـ Firebase للتنسيق بين المستخدمين)
        console.log("الصوت يعمل محلياً..");
    };

    window.endCall = async () => {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        await deleteDoc(doc(db, "active_calls", myName));
        document.getElementById('callBar').style.display = 'none';
        document.getElementById('callBtn').style.display = 'block';
    };

    // تحديث قائمة المتواجدين في المكالمة فوراً (المستطيل العلوي)
    onSnapshot(collection(db, "active_calls"), (snap) => {
        const list = document.getElementById('participantsList');
        list.innerHTML = "";
        snap.forEach(doc => {
            const user = doc.data();
            list.innerHTML += `<div class="avatar" title="${user.name}">${user.initials}</div>`;
        });
    });

    // كود الشات العادي
    window.sendMsg = async () => {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        await addDoc(collection(db, "messages"), { text: input.value, user: myName, time: serverTimestamp() });
        input.value = "";
    };

    onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
        const container = document.getElementById('messages');
        container.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span style="color:var(--main-color); font-size:10px;">${data.user}</span><br>${data.text}`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    });
</script>
</body>
</html>
