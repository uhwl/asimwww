<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsimTalk | المجلس المطور</title>
    <style>
        :root { --main-color: #00ff00; --bg-dark: #0e0e0e; --panel-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: var(--panel-bg); padding: 15px; border-bottom: 2px solid var(--main-color); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: var(--panel-bg); padding: 10px 15px; border-radius: 8px; position: relative; max-width: 70%; align-self: flex-start; border-right: 3px solid var(--main-color); }
        .msg:hover .actions { display: block; }
        .actions { display: none; position: absolute; left: -60px; top: 5px; }
        .actions button { font-size: 10px; padding: 3px; cursor: pointer; background: #333; color: white; border: 1px solid #555; }
        .user-name { color: var(--main-color); font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; }
        #input-area { background: var(--panel-bg); padding: 20px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; background: #252525; border: 1px solid #444; color: white; border-radius: 5px; }
        button { background: var(--main-color); color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <div>⚡ AsimTalk</div>
    <div id="userInfo">مرحباً بك</div>
</div>

<div id="messages"></div>

<div id="input-area">
    <input type="text" id="chatInput" placeholder="اكتب رسالتك...">
    <button onclick="sendMsg()">إرسال</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDilbY1pYCSFCB3graoYdst79pCo8rxGK8",
        authDomain: "asimtalk-8a037.firebaseapp.com",
        projectId: "asimtalk-8a037",
        storageBucket: "",
        messagingSenderId: "76554634749",
        appId: "1:76554634749:web:a8e4eeb9a96cf578c90594"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. نظام الاسم والتحقق
    let myName = localStorage.getItem('chatName');
    if (!myName) {
        myName = prompt("أهلاً بك في AsimTalk! اختر اسمك المستعار:");
        if(!myName) myName = "ضيف_" + Math.floor(Math.random() * 1000);
        localStorage.setItem('chatName', myName);
    }
    document.getElementById('userInfo').innerText = "الاسم: " + myName;

    // 2. طلب إذن الإشعارات
    if ("Notification" in window) {
        Notification.requestPermission();
    }

    // 3. دالة الإرسال
    window.sendMsg = async () => {
        const text = document.getElementById('chatInput').value;
        if(text.trim() == "") return;
        await addDoc(collection(db, "messages"), {
            text: text,
            user: myName,
            time: serverTimestamp()
        });
        document.getElementById('chatInput').value = "";
    };

    // 4. دالة الحذف والتعديل
    window.editMsg = async (id, oldText) => {
        const newText = prompt("عدل رسالتك:", oldText);
        if(newText) await updateDoc(doc(db, "messages", id), { text: newText });
    };

    window.deleteMsg = async (id) => {
        if(confirm("هل تريد حذف الرسالة؟")) await deleteDoc(doc(db, "messages", id));
    };

    // 5. استلام الرسائل المباشر
    const q = query(collection(db, "messages"), orderBy("time", "asc"));
    onSnapshot(q, (snapshot) => {
        const container = document.getElementById('messages');
        container.innerHTML = "";
        snapshot.forEach(d => {
            const data = d.data();
            const div = document.createElement('div');
            div.className = 'msg';
            
            // إضافة أزرار التحكم إذا كانت الرسالة لي
            let actions = "";
            if(data.user === myName) {
                actions = `<div class="actions">
                    <button onclick="editMsg('${d.id}', '${data.text}')">تعديل</button>
                    <button onclick="deleteMsg('${d.id}')">حذف</button>
                </div>`;
            }

            div.innerHTML = `<span class="user-name">${data.user}</span> ${data.text} ${actions}`;
            container.appendChild(div);

            // إرسال إشعار إذا كانت الرسالة من شخص آخر والموقع في الخلفية
            if (data.user !== myName && document.hidden) {
                new Notification(`AsimTalk: ${data.user}`, { body: data.text });
            }
        });
        container.scrollTop = container.scrollHeight;
    });
</script>

</body>
</html>
